---
# Namespace for LGTM Stack
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring

---
# Loki - Log Aggregation
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    ruler:
      storage:
        type: local
        local:
          directory: /etc/loki/rules
      rule_path: /tmp/loki/scratch
      ring:
        kvstore:
          store: inmemory
      enable_api: true

    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.0
        args:
        - -config.file=/etc/loki/loki.yaml
        ports:
        - containerPort: 3100
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: storage
          mountPath: /loki
        - name: rules
          mountPath: /etc/loki/rules/fake
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: storage
        emptyDir: {}
      - name: rules
        configMap:
          name: loki-alerts

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
spec:
  selector:
    app: loki
  ports:
  - port: 3100
    targetPort: 3100
    name: http

---
# Promtail - Log Shipper (sends logs to Loki)
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
    - job_name: kubernetes-pods
      static_configs:
      - targets:
        - localhost
        labels:
          job: kubernetes-pods
          __path__: /var/log/pods/*/*/*.log
      pipeline_stages:
      - match:
          selector: '{job="kubernetes-pods"}'
          stages:
          - regex:
              expression: ^/var/log/pods/(?P<namespace>[a-zA-Z0-9_-]+)_(?P<app>[a-zA-Z0-9_-]+)-[a-z0-9A-Z]+-[a-z0-9A-Z]+_[a-f0-9-]+/.*\.log$
              source: filename
          - labels:
              namespace:
              app:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            source: source
            count: count
            duration_ms: duration_ms
      - labels:
          level:
          source:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:2.9.0
        args:
        - -config.file=/etc/promtail/promtail.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
- apiGroups: [""]
  resources:
  - nodes
  - services
  - pods
  verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: promtail
  apiGroup: rbac.authorization.k8s.io

---
# Tempo - Distributed Tracing
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    stream_over_http_enabled: true
    server:
      http_listen_port: 3200
      log_level: info

    query_frontend:
      search:
        duration_slo: 5s
        throughput_bytes_slo: 1.073741824e+09
      trace_by_id:
        duration_slo: 5s

    distributor:
      ring:
        kvstore:
          store: inmemory
      receivers:
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268
            grpc:
              endpoint: 0.0.0.0:14250
        zipkin:
          endpoint: 0.0.0.0:9411
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
        opencensus:

    memberlist:
      abort_if_cluster_join_fails: false
      bind_port: 7946
      join_members: [127.0.0.1:7946]

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1


    metrics_generator:
      ring:
        kvstore:
          store: inmemory

    storage:
      trace:
        backend: local
        wal:
          path: /tmp/tempo/wal
        local:
          path: /tmp/tempo/blocks

    overrides:
      defaults:
        ingestion:
          max_traces_per_user: 10000


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
      - name: tempo
        image: grafana/tempo:2.3.1
        args:
        - -config.file=/etc/tempo/tempo.yaml
        ports:
        - containerPort: 3200
          name: http
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        volumeMounts:
        - name: config
          mountPath: /etc/tempo
        - name: storage
          mountPath: /tmp/tempo
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: tempo-config
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring
spec:
  selector:
    app: tempo
  ports:
  - port: 3200
    targetPort: 3200
    name: http
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: otlp-http

---
# Mimir - Metrics Storage (Prometheus-compatible)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: monitoring
data:
  mimir.yaml: |
    target: all

    multitenancy_enabled: false

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095

    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/blocks

    compactor:
      data_dir: /data/compactor

    distributor:
      ring:
        kvstore:
          store: inmemory

    ingester:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /etc/mimir/rules

    ruler:
      rule_path: /tmp/mimir/rules-scratch
      ring:
        kvstore:
          store: inmemory

    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
      - name: mimir
        image: grafana/mimir:2.10.0
        args:
        - -config.file=/etc/mimir/mimir.yaml
        ports:
        - containerPort: 9009
          name: http
        - containerPort: 9095
          name: grpc
        volumeMounts:
        - name: config
          mountPath: /etc/mimir
        - name: storage
          mountPath: /data
        - name: rules
          mountPath: /etc/mimir/rules/fake
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: mimir-config
      - name: storage
        emptyDir: {}
      - name: rules
        configMap:
          name: mimir-alerts

---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: monitoring
spec:
  selector:
    app: mimir
  ports:
  - port: 9009
    targetPort: 9009
    name: http
  - port: 9095
    targetPort: 9095
    name: grpc

---
# Prometheus - Scrapes metrics and sends to Mimir
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    remote_write:
    - url: http://mimir:9009/api/v1/push

    scrape_configs:
    - job_name: 'kubernetes-services'
      kubernetes_sd_configs:
      - role: service
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        regex: 'true'
        action: keep
      - source_labels: [__meta_kubernetes_service_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        regex: 'true'
        action: keep
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        target_label: __address__
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.enable-lifecycle
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    name: http

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus
  apiGroup: rbac.authorization.k8s.io

---
# Grafana - Unified Dashboards
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false
      editable: true
      jsonData:
        manageAlerts: true

    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      isDefault: false
      editable: true

    - name: Mimir
      type: prometheus
      access: proxy
      url: http://mimir:9009/prometheus
      isDefault: true
      editable: true
      jsonData:
        timeInterval: "15s"
        manageAlerts: true
        prometheusType: Mimir

---
# Grafana Dashboard Provisioning — tells Grafana where to find dashboards
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: intel-pipeline
      orgId: 1
      folder: Intel Pipeline
      type: file
      disableDeletion: false
      updateIntervalSeconds: 30
      options:
        path: /etc/grafana/provisioning/dashboards/json

---
# Grafana Dashboard JSON — Intel Ingestion Pipeline + Tempo traces
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-json
  namespace: monitoring
data:
  intel-pipeline.json: |
    {
      "title": "Intel Ingestion Pipeline",
      "uid": "intel-pipeline-v1",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "mimir_ds",
            "type": "datasource",
            "query": "prometheus",
            "label": "Metrics Source",
            "hide": 0,
            "refresh": 1
          },
          {
            "name": "tempo_ds",
            "type": "datasource",
            "query": "tempo",
            "label": "Traces Source",
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Indicators Consumed (NATS)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [{
            "expr": "sum(increase(threat_indicators_consumed_total[1h]))",
            "legendFormat": "Consumed"
          }],
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } }
        },
        {
          "id": 2,
          "title": "Indicators Processed (Redis)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [{
            "expr": "sum(increase(threat_indicators_processed_total[1h]))",
            "legendFormat": "Processed"
          }],
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } } }
        },
        {
          "id": 3,
          "title": "Failed Indicators",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [{
            "expr": "sum(increase(threat_indicators_failed_total[1h]))",
            "legendFormat": "Failed"
          }],
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 10 }] } } }
        },
        {
          "id": 4,
          "title": "NATS Queue Backlog",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [{
            "expr": "nats_queue_backlog",
            "legendFormat": "Pending"
          }],
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1000 }, { "color": "red", "value": 10000 }] } } }
        },
        {
          "id": 5,
          "title": "Throughput — Consumed vs Processed (per min)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "sum(rate(threat_indicators_consumed_total[1m])) * 60", "legendFormat": "Consumed/min" },
            { "expr": "sum(rate(threat_indicators_processed_total[1m])) * 60", "legendFormat": "Processed/min" },
            { "expr": "sum(rate(threat_indicators_failed_total[1m])) * 60", "legendFormat": "Failed/min" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 6,
          "title": "NATS Queue Backlog Over Time",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "nats_queue_backlog", "legendFormat": "Queue Depth" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 20 }, "color": { "fixedColor": "orange", "mode": "fixed" } } }
        },
        {
          "id": 7,
          "title": "Processing Duration — P50 / P95 / P99 (seconds)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum(rate(indicator_processing_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum(rate(indicator_processing_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum(rate(indicator_processing_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 8,
          "title": "Redis Storage Operations (per min)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "sum(rate(redis_storage_operations_total{status='success'}[1m])) * 60", "legendFormat": "Success/min" },
            { "expr": "sum(rate(redis_storage_operations_total{status='failed'}[1m])) * 60", "legendFormat": "Failed/min" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2 } } }
        },
        {
          "id": 9,
          "title": "NATS Publish Errors by Source",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "sum by (source) (rate(nats_publish_errors_total[1m])) * 60", "legendFormat": "{{source}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2 }, "color": { "fixedColor": "red", "mode": "fixed" } } }
        },
        {
          "id": 10,
          "title": "Processor Replica Count",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "count(up{app='intel-processor'})", "legendFormat": "Active Replicas" }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 }, "color": { "fixedColor": "purple", "mode": "fixed" } } }
        },
        {
          "id": 11,
          "title": "Traces — Recent Spans (Tempo)",
          "type": "traces",
          "gridPos": { "x": 0, "y": 27, "w": 24, "h": 10 },
          "datasource": { "type": "tempo", "uid": "${tempo_ds}" },
          "targets": [{
            "queryType": "traceql",
            "query": "{resource.service.name=~\"intel-processor|intel-worker|intel-fetcher\"}",
            "limit": 20
          }],
          "options": {
            "dedupStrategy": "none",
            "sortBy": "startTime"
          }
        },
        {
          "id": 12,
          "title": "Span Duration Heatmap — process_indicator",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 37, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${mimir_ds}" },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum(rate(indicator_processing_duration_seconds_bucket[2m])) by (le, source))", "legendFormat": "p50 — {{source}}" },
            { "expr": "histogram_quantile(0.95, sum(rate(indicator_processing_duration_seconds_bucket[2m])) by (le, source))", "legendFormat": "p95 — {{source}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 1 } } }
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Admin
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provisioning
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboard-json
          mountPath: /etc/grafana/provisioning/dashboards/json
        - name: storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboard-provisioning
        configMap:
          name: grafana-dashboard-provisioning
      - name: dashboard-json
        configMap:
          name: grafana-dashboards-json
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: NodePort
