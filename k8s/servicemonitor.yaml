# Optional: ServiceMonitor for Prometheus Operator
# This enables automatic scraping of metrics by Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: intel-worker-metrics
  namespace: intel-ingestion
  labels:
    app: intel-worker
    release: prometheus
spec:
  selector:
    matchLabels:
      app: intel-worker
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
  namespaceSelector:
    matchNames:
    - intel-ingestion
