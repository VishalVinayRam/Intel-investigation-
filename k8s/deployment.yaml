apiVersion: apps/v1
kind: Deployment
metadata:
  name: intel-worker
  namespace: intel-ingestion
  labels:
    app: intel-worker
    version: v1
    environment: poc
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: intel-worker
  template:
    metadata:
      labels:
        app: intel-worker
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Security: Use service account with limited permissions
      serviceAccountName: intel-worker-sa

      # Security: Pod security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: worker
        image: intel-worker:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000
          name: metrics
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: worker-config

        # Sensitive environment variables from Secret
        env:
        - name: THREAT_FEED_API_KEY
          valueFrom:
            secretKeyRef:
              name: threat-feed-secrets
              key: THREAT_FEED_API_KEY
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-feed-secrets
              key: REDIS_PASSWORD
              optional: true

        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Security: Container security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

        # Volumes for temp files (read-only root filesystem)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache

      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      # DNS policy
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intel-worker-sa
  namespace: intel-ingestion
  labels:
    app: intel-worker
automountServiceAccountToken: false
