# Prometheus Alert Rules for Threat Intelligence Worker
# Deploy this with Prometheus Operator or add to prometheus.yml

apiVersion: v1
kind: ConfigMap
metadata:
  name: intel-worker-alerts
  namespace: monitoring
data:
  intel-worker-rules.yaml: |
    groups:
    - name: threat_intel_alerts
      interval: 30s
      rules:

      # Alert: Threat Feed Source Down
      - alert: ThreatFeedSourceDown
        expr: |
          rate(external_api_errors_count[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          component: threat-intelligence
          category: availability
        annotations:
          summary: "Threat feed source {{ $labels.source }} is experiencing high error rate"
          description: |
            The threat intelligence feed '{{ $labels.source }}' has an error rate of {{ $value | humanizePercentage }}
            over the last 5 minutes. This may indicate the feed is down or unreachable.

            Impact: Intelligence data may be stale or incomplete.
            Action: Check external feed availability and network connectivity.
          runbook_url: "https://wiki.example.com/runbooks/threat-feed-down"
          dashboard_url: "https://grafana.example.com/d/threat-intel/dashboard"

      # Alert: No Indicators Processed
      - alert: NoThreatIndicatorsProcessed
        expr: |
          rate(threat_indicators_processed_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
          component: threat-intelligence
          category: data-ingestion
        annotations:
          summary: "No threat indicators processed in last 10 minutes"
          description: |
            The threat intelligence worker has not processed any indicators for 10 minutes.
            This could indicate:
            - Worker is stuck or crashed
            - All threat feeds are down
            - Redis connection issues

            Current rate: {{ $value }}
          runbook_url: "https://wiki.example.com/runbooks/no-indicators"

      # Alert: High API Error Rate
      - alert: HighExternalAPIErrorRate
        expr: |
          (
            sum(rate(external_api_errors_count[5m])) /
            sum(rate(threat_indicators_processed_total[5m]) + rate(external_api_errors_count[5m]))
          ) > 0.25
        for: 5m
        labels:
          severity: warning
          component: threat-intelligence
          category: reliability
        annotations:
          summary: "High error rate ({{ $value | humanizePercentage }}) calling external APIs"
          description: |
            More than 25% of external API calls are failing.
            This suggests widespread issues with threat feed providers.

            Error rate: {{ $value | humanizePercentage }}
            Check individual feed status and network policies.

      # Alert: Worker Pod Down
      - alert: ThreatIntelWorkerDown
        expr: |
          kube_deployment_status_replicas_available{namespace="intel-ingestion",deployment="intel-worker"} == 0
        for: 2m
        labels:
          severity: critical
          component: threat-intelligence
          category: availability
        annotations:
          summary: "Threat Intelligence Worker is down"
          description: |
            No replicas of the intel-worker deployment are available.
            Intelligence ingestion has stopped completely.

            Immediate action required.
          runbook_url: "https://wiki.example.com/runbooks/worker-down"

      # Alert: Worker Pod Restart Loop
      - alert: ThreatIntelWorkerCrashLoop
        expr: |
          rate(kube_pod_container_status_restarts_total{namespace="intel-ingestion",pod=~"intel-worker.*"}[15m]) > 0
        for: 15m
        labels:
          severity: warning
          component: threat-intelligence
          category: stability
        annotations:
          summary: "Worker pod {{ $labels.pod }} is crash-looping"
          description: |
            The worker pod has restarted {{ $value }} times in the last 15 minutes.
            Check logs: kubectl logs -n intel-ingestion {{ $labels.pod }} --previous
          runbook_url: "https://wiki.example.com/runbooks/crash-loop"

      # Alert: Redis Connection Issues
      - alert: RedisConnectionErrors
        expr: |
          rate(external_api_errors_count{error_type="redis_connection"}[5m]) > 0
        for: 3m
        labels:
          severity: critical
          component: threat-intelligence
          category: infrastructure
        annotations:
          summary: "Worker cannot connect to Redis"
          description: |
            The threat intelligence worker is experiencing Redis connection errors.
            This will prevent indicator storage and queue processing.

            Check Redis pod status and network policies.
          runbook_url: "https://wiki.example.com/runbooks/redis-issues"

      # Alert: Low Indicator Processing Rate
      - alert: LowIndicatorProcessingRate
        expr: |
          rate(threat_indicators_processed_total[5m]) < 0.1
        for: 15m
        labels:
          severity: warning
          component: threat-intelligence
          category: performance
        annotations:
          summary: "Unusually low threat indicator processing rate"
          description: |
            The worker is processing indicators at {{ $value }} per second,
            which is below the expected baseline of 0.1/sec.

            This may indicate:
            - Degraded feed performance
            - Worker performance issues
            - Reduced threat activity (less likely)

      # Alert: Stale Threat Feed Data
      - alert: StaleThreatFeedData
        expr: |
          (time() - threat_feed_last_success_timestamp) > 900
        for: 5m
        labels:
          severity: warning
          component: threat-intelligence
          category: freshness
        annotations:
          summary: "Threat feed {{ $labels.source }} data is stale"
          description: |
            The feed '{{ $labels.source }}' hasn't been successfully fetched
            in {{ $value | humanizeDuration }}.

            Data freshness is critical for threat intelligence.
            Investigate feed availability immediately.

      # Alert: Memory Pressure
      - alert: WorkerHighMemoryUsage
        expr: |
          (
            container_memory_working_set_bytes{namespace="intel-ingestion",pod=~"intel-worker.*"}
            / container_spec_memory_limit_bytes{namespace="intel-ingestion",pod=~"intel-worker.*"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          component: threat-intelligence
          category: resources
        annotations:
          summary: "Worker pod {{ $labels.pod }} using {{ $value | humanizePercentage }} of memory"
          description: |
            Memory usage is above 85%. This may lead to OOMKills.
            Consider increasing memory limits or investigating memory leaks.

---
# PrometheusRule CRD (for Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: intel-worker-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: threat_intel_alerts
    interval: 30s
    rules:
    - alert: ThreatFeedSourceDown
      expr: rate(external_api_errors_count[5m]) > 0.1
      for: 5m
      labels:
        severity: critical
        component: threat-intelligence
      annotations:
        summary: "Threat feed {{ $labels.source }} is down or unreachable"
        description: "Error rate: {{ $value | humanizePercentage }} over last 5 minutes"
