name: SecDevOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: intel-worker
  REGISTRY: ghcr.io
  NAMESPACE: intel-ingestion
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Static Application Security Testing (SAST)
  sast-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] pip-audit

    - name: Run Bandit SAST scan
      run: |
        echo "Running Bandit security scanner..."
        bandit -c pyproject.toml -r app/ -f json -o bandit-report.json || true
        bandit -c pyproject.toml -r app/ -f txt

    - name: Check for hardcoded secrets
      run: |
        echo "Scanning for hardcoded secrets..."
        # Check for common secret patterns
        if grep -r -E "(password|api_key|secret|token)\s*=\s*['\"][^'\"]{8,}" app/ --exclude-dir=__pycache__; then
          echo "ERROR: Potential hardcoded secrets found!"
          exit 1
        else
          echo "No hardcoded secrets detected."
        fi

    - name: Run pip-audit for vulnerable dependencies
      run: |
        echo "Checking for vulnerable dependencies..."
        pip-audit -r app/requirements.txt --format json -o pip-audit-report.json || true
        pip-audit -r app/requirements.txt

    - name: Upload Security Scan Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-results
        path: |
          bandit-report.json
          pip-audit-report.json

  # Job 2: Software Composition Analysis (SCA) with Trivy
  sca-scan:
    name: SCA Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner in fs mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'app/'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        trivyignores: '.trivyignore'

    - name: Run Trivy vulnerability scanner (table output)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'app/'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM'
        trivyignores: '.trivyignore'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Job 3: Build and Scan Docker Image
  build-and-scan:
    name: Build & Scan Container Image
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner on image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        severity: 'CRITICAL,HIGH'
        trivyignores: '.trivyignore'

    - name: Run Trivy vulnerability scanner on image (table)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'  # Fail if critical vulnerabilities found
        trivyignores: '.trivyignore'

    - name: Upload Trivy image results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-image-results.sarif'

    - name: Save Docker image
      run: |
        docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o intel-worker-image.tar

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: intel-worker-image.tar
        retention-days: 1

  # Job 4: Image Signing (Sigstore/Cosign)
  sign-image:
    name: Sign Container Image
    runs-on: ubuntu-latest
    needs: build-and-scan
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for keyless signing

    steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Download Docker image
      uses: actions/download-artifact@v4
      with:
        name: docker-image

    - name: Load Docker image
      run: |
        docker load -i intel-worker-image.tar

    - name: Sign image with Cosign (Keyless)
      run: |
        echo "=== Image Signing Strategy ==="
        echo "For production, we would sign the image using Sigstore/Cosign:"
        echo ""
        echo "1. Keyless signing (recommended for CI/CD):"
        echo "   cosign sign --yes \$IMAGE_URI"
        echo ""
        echo "2. Key-based signing:"
        echo "   cosign sign --key cosign.key \$IMAGE_URI"
        echo ""
        echo "3. Verification in K8s:"
        echo "   - Use admission controller (e.g., Kyverno, OPA Gatekeeper)"
        echo "   - Verify signature before allowing pod creation"
        echo "   - Policy: only allow images signed by trusted identity"
        echo ""
        echo "Example verification:"
        echo "   cosign verify --certificate-identity-regexp='.*@example\\.com' \\"
        echo "     --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\"
        echo "     \$IMAGE_URI"
        echo ""
        echo "For this POC, image signing is demonstrated conceptually."
        echo "In production, uncomment the actual signing command below:"
        echo ""
        echo "# cosign sign --yes ${{ env.IMAGE_NAME }}:${{ github.sha }}"

  # Job 5: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: sign-image
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: http://intel-worker.intel-ingestion.svc.cluster.local:8000/metrics

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Docker image
      uses: actions/download-artifact@v4
      with:
        name: docker-image

    - name: Load Docker image
      run: |
        docker load -i intel-worker-image.tar
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Deploy to Kubernetes (Staging)
      run: |
        echo "=== Deployment Strategy for Staging ==="
        echo ""
        echo "In a real environment, this would:"
        echo "1. Configure kubectl to connect to staging cluster"
        echo "2. Apply Terraform infrastructure (if not already deployed)"
        echo "3. Update image tag in K8s deployment"
        echo "4. Apply Kubernetes manifests"
        echo "5. Wait for rollout to complete"
        echo "6. Run smoke tests"
        echo ""
        echo "Example commands:"
        echo "  kubectl config use-context staging"
        echo "  kubectl set image deployment/intel-worker \\"
        echo "    worker=${{ env.IMAGE_NAME }}:${{ github.sha }} \\"
        echo "    -n ${{ env.NAMESPACE }}"
        echo "  kubectl rollout status deployment/intel-worker -n ${{ env.NAMESPACE }}"
        echo ""
        echo "For local minikube deployment, run:"
        echo "  minikube start"
        echo "  eval \$(minikube docker-env)"
        echo "  docker build -t intel-worker:latest ."
        echo "  cd terraform && terraform apply -auto-approve"
        echo "  kubectl apply -f k8s/"

    - name: Verify deployment health
      run: |
        echo "Health check would verify:"
        echo "  - Pod is running"
        echo "  - Metrics endpoint is accessible"
        echo "  - No errors in logs"
        echo "  - Threat feeds are being fetched"

  # Job 6: Security Summary Report
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan, build-and-scan]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate Security Summary
      run: |
        echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Scans Completed:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SAST (Bandit)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Secret Detection" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Dependency Scanning (Safety)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SCA (Trivy)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Container Image Scanning" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Security Best Practices Implemented:" >> $GITHUB_STEP_SUMMARY
        echo "- 🐳 Multi-stage Docker build" >> $GITHUB_STEP_SUMMARY
        echo "- 👤 Non-root container user" >> $GITHUB_STEP_SUMMARY
        echo "- 🔐 No secrets in image" >> $GITHUB_STEP_SUMMARY
        echo "- 📦 Minimal base image (python:3.11-slim)" >> $GITHUB_STEP_SUMMARY
        echo "- 🔒 Read-only root filesystem" >> $GITHUB_STEP_SUMMARY
        echo "- 🚫 Dropped ALL capabilities" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "For detailed results, check the artifacts and security tab." >> $GITHUB_STEP_SUMMARY
